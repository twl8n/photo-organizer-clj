<!DOCTYPE HTML>
<html>
  <head>
    <title>New Place</title>
  </head>
  <body bgcolor="#ffffff">
    <table border="0" cellpadding="3" cellspacing="0" width="800">
      <tbody>
        <tr>
          <td bgcolor="#99cccc" valign="top">
            <div align="center">
              <form action="./porg" method="post">
                <input name="d_state" value="{{d_state}}" type="hidden">
                <input name="prev_state" value="{{prev_state}}" type="hidden">
                <input name="photo_pk" value="{{photo_pk}}" type="hidden">
                <input name="place_pk" value="{{place_pk}}" type="hidden">
                place_pk {{place_pk}}
                <br>
                Place name: <input name="place_name" value="{{place_name}}" type="text"><br>
                street1: <input name="street1" value="{{street1}}" type="text"><br>
                street2: <input name="street2" value="{{street2}}" type="text"><br>
                city: <input name="city" value="{{city}}" type="text"><br>
                state: <input name="state" value="{{state}}" type="text"><br>
                zip_code: <input name="zip_code" value="{{zip_code}}" type="text"><br>
                longitude: <input name="longitude" value="{{longitude}}" type="text"><br>
                latitude: <input name="latitude" value="{{latitude}}" type="text"><br>
                <br>
                <input name="s_cancel" value="Cancel" type="submit">
                <br>
                <input name="s_save" value="Save" type="submit">
                <br>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <br>
    <br>
    Template: {{page_name}} d_state: {{d_state}}
    <script>
      document.getElementById("scroll").scrollIntoView();
    </script>
  </body>
</html>
