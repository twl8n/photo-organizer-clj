<!DOCTYPE HTML>
<html>
  <head>
    <title>Login</title>
    <style>
      * {
          box-sizing: border-box;
      }
      .wrapper {
          max-width: 940px;
          margin: 0 auto;
      }
      .wrapper > div {
          border: 2px solid rgb(233 171 88);
          border-radius: 5px;
          background-color: #99cccc; /* rgb(233 171 88 / 50%); */
          padding: 1em;
          color: black; /* #d9480f; */
      }
      .wrapper {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 10px;
          grid-auto-rows: minmax(100px, auto);
      }
      .pane1 {
          grid-column: 1 / 1;
          grid-row: 1/3;
      }
      .pane2 {
          grid-column: 2 / 3;
          grid-row: 1 / 3;
      }
      .pane3 {
          grid-column: 3 / 4;
          grid-row: 1 / 3;
      }
    </style>
  </head>
  <body bgcolor="#ffffff">
    <div class="wrapper">
      <div class="pane1">
        <form action="./porg" method="post">
          <input name="phdata" value="{{phdata}}" type="hidden">
          <input name="do_check_auth" value="1" type="hidden">
          <div style="text-align: left;">
            Userid <input name="userid" value="" type="text">
            <input name="s_login" value="Login" type="submit">
          </div>
        </form>
    </div>
    Template: login.html 
    <br>
    <pre>{{debug}}</pre>
    <script>
      document.getElementById("scroll").scrollIntoView();
    </script>
  </body>
</html>
