<!DOCTYPE HTML>
<html>
  <head>
    <title>Place Page</title>
  </head>
  <body bgcolor="#ffffff">
    <table border="0" cellpadding="3" cellspacing="0" width="800">
      <tbody>
        <tr>
          <td bgcolor="#99cccc" valign="top">
            <div align="center">
              <form action="./porg" method="post">
                <input name="phdata" value="{{phdata}}" type="hidden">
                <input name="{{curr_page_state}}" value="1" type="hidden">
                <input name="userid" value="{{userid}}" type="hidden">
                <input name="prev_state" value="{{pre_state}}" type="hidden">
                <input name="photo_pk" value="{{photo_pk}}" type="hidden">
                <input name="{{want_place_val}}" value="1" type="hidden">
                <input name="s_edit" value="Edit" type="submit">
                <br>
                <input name="s_cancel" value="Cancel" type="submit">
                <br>
                <input name="s_new" value="Add New" type="submit">
                <br>
                {{#want_place_bool}}
                <input name="s_save_choice" value="Chose this place" type="submit">
                {{/want_place_bool}}
                <br>
                photo_pk {{photo_pk}} / place_pk {{place_pk}}
                <br>
                <input name="s_edit_photo" value="Edit photo {{photo_pk}}" type="submit">
                <br>
                <fieldset style="text-align: left">
                  <legend>Choose a place</legend>
                  {{#place_list}}
                    <input type="radio" id="{{place_pk}}" name="place_pk" value="{{place_pk}}" {{checked}} />
                    <label for="{{place_pk}}">{{place_name}} pk: {{place_pk}}</label>
                    <br>
                    {{/place_list}}
                </fieldset>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <br>
    <br>
    Template: {{page_name}} curr_page_state: {{curr_page_state}} userid: {{userid}}
    <br>
    <pre>{{debug}}</pre>
    <script>
      document.getElementById("scroll").scrollIntoView();
    </script>
  </body>
</html>
