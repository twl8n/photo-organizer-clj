<!DOCTYPE HTML>
<html>
  <head>
    <title>Start Page</title>
  </head>
  <body bgcolor="#ffffff">
    <table border="0" cellpadding="3" cellspacing="0" width="800">
      <tbody>
        <tr>
          <td bgcolor="#99cccc" valign="top">
            Photo directory is {{pic_root_path}}<br>
            You have {{recordsfound}} images.
            <br>
            First non-annotated image:
            <img style="max-width: 300px; height: auto;" src="{{pathfile_name}}">
          </td>
        </tr>
        <tr>
          <td bgcolor="#99cccc" valign="top">
            <div align="center">
              <form action="./porg" method="post">
                <input name="d_state" value="s_start_page" type="hidden">
                <input name="photo_pk" value="{{photo_pk}}" type="hidden">
                <div style="text-align: left;">
                  <input name="s_scan" value="Scan or rescan directory tree" type="submit">
                  <br>
                  <input name="s_populate_db" value="Populate DB" type="submit">
                  <br>
                  <input name="s_next" value="Edit Next Photo" type="submit">
                </div>
              </form>

              <form action="./porg" method="post">
                <input name="d_state" value="s_photo_page" type="hidden">
                <input name="photo_pk" value="{{photo_pk}}" type="hidden">
                <div style="text-align: left;">
                  <input name="s_edit" value="Edit Photo" type="submit">
                </div>
              </form>


            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <br>
    <br>
    Template: start_page.html d_state: {{d_state}}
    <script>
      document.getElementById("scroll").scrollIntoView();
    </script>
  </body>
</html>
